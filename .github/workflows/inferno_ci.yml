name: Inferno TDD Pipeline

on:
  push:
    branches: [ "main", "feat/server/Database-Wrath" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Linux Job - Matches Required Check: build-and-test (ubuntu-latest, gcc_64)
  linux-build:
    name: build-and-test (ubuntu-latest, gcc_64)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inferno_db
          POSTGRES_USER: operator
          POSTGRES_PASSWORD: inferno_password_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake libgl1-mesa-dev qt6-base-dev libqt6sql6-psql libpq-dev
        PGPASSWORD=inferno_password_2026 psql -h localhost -U operator -d inferno_db -c "GRANT ALL ON SCHEMA public TO operator;"

    - name: Configure CMake
      run: cmake -B build -S . -G Ninja
      
    - name: Native Build
      run: ninja -C build
      
    - name: Execute Native Assertions
      env:
        INFERNO_TESTING: 1
        QT_PLUGIN_PATH: /usr/lib/x86_64-linux-gnu/qt6/plugins
      run: ./build/inferno_tests

  # macOS Job - Matches Required Check: build-and-test (macos-latest, clang_64)
  macos-build:
    name: build-and-test (macos-latest, clang_64)
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (macOS)
      run: |
        brew install ninja cmake qt postgresql@16
        brew services start postgresql@16
        sleep 10 # Wait for PG to fully start
        psql postgres -c "CREATE DATABASE inferno_db;"
        psql postgres -c "CREATE USER operator WITH PASSWORD 'inferno_password_2026';"
        psql postgres -c "GRANT ALL PRIVILEGES ON DATABASE inferno_db TO operator;"

    - name: Configure CMake
      run: cmake -B build -S . -G Ninja
      
    - name: Native Build
      run: ninja -C build
      
    - name: Execute Native Assertions
      env:
        INFERNO_TESTING: 1
      run: ./build/inferno_tests
