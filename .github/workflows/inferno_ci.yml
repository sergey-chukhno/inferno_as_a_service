name: Inferno TDD Pipeline

on:
  push:
    branches: [ "main", "feat/server/Database-Wrath" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inferno_db
          POSTGRES_USER: operator
          POSTGRES_PASSWORD: inferno_password_2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake libgl1-mesa-dev qt6-base-dev qt6-sql-psql libpq-dev
        # Fix permissions for the schema
        PGPASSWORD=inferno_password_2026 psql -h localhost -U operator -d inferno_db -c "GRANT ALL ON SCHEMA public TO operator;"

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ninja cmake qt
        # Postgres is already running as a service in this workflow, so no brew install needed here

    - name: Configure CMake
      run: cmake -B build -S . -G Ninja
      
    - name: Native Build
      run: ninja -C build
      
    - name: Execute Native Assertions
      env:
        INFERNO_TESTING: 1
        # Ensure Linux can find the system SQL plugins
        QT_PLUGIN_PATH: /usr/lib/x86_64-linux-gnu/qt6/plugins
      run: ./build/inferno_tests
