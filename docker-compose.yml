version: '3.8'

services:
  inferno-db:
    image: postgres:16-alpine
    container_name: inferno_postgres
    restart: always
    environment:
      POSTGRES_DB: inferno_db
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: inferno_password_2026
    ports:
      - "5432:5432"
    volumes:
      - inferno_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d inferno_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  inferno_data:
    driver: local
